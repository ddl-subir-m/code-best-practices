query($number: Int!) {
  repository(owner: "cerebrotech", name: "domino") {
    pullRequest(number: $number) {
      number
      title
      author { login }
      mergedAt
      reviewThreads(first: 50) {
        nodes {
          comments(first: 20) {
            nodes {
              author { login }
              body
              createdAt
            }
          }
          isResolved
          path
          line
        }
      }
    }
  }
}
